<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>noti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/app.css" />
</head>
<body>
  <div id="app">

    <!-- ═══ SIDEBAR ════════════════════════════════════════════════════ -->
    <aside id="sidebar">
      <!-- Header: Logo -->
      <div id="sidebar-header"></div>

      <!-- Search -->
      <div id="sidebar-search"></div>

      <!-- Action Bar: new note / new folder / sort -->
      <div id="sidebar-actions"></div>

      <!-- Section divider -->
      <div style="height:1px;background:var(--sidebar-border);flex-shrink:0;"></div>

      <!-- Folder tree -->
      <div id="sidebar-folders"></div>

      <!-- Notes list -->
      <div id="sidebar-notes"></div>

      <!-- Footer: settings + theme toggle -->
      <div id="sidebar-footer"></div>
    </aside>

    <!-- ═══ MAIN CONTENT ════════════════════════════════════════════════ -->
    <main id="main-content">

      <!-- Top bar: breadcrumb + status + theme toggle -->
      <div id="top-bar"></div>

      <!-- Editor header: title + action buttons -->
      <div id="editor-header"></div>

      <!-- AI toolbar: prompt select + run -->
      <div id="ai-toolbar"></div>

      <!-- Editor area OR empty state — mutually exclusive -->
      <div id="editor-area"></div>
      <div id="empty-state" class="hidden"></div>

      <!-- AI result panel (shown when streaming/result available) -->
      <div id="ai-panel" class="hidden"></div>

      <!-- Recording bar (shown during recording) -->
      <div id="recording-bar" class="hidden"></div>

    </main>

    <!-- ═══ MODAL OVERLAY ═══════════════════════════════════════════════ -->
    <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true">
      <div id="modal-content"></div>
    </div>

    <!-- ═══ NOTIFICATION TOAST ══════════════════════════════════════════ -->
    <div id="notification-toast" class="hidden"></div>

  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
